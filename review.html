<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block Blast</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ── Variables ──────────────────────────────────────────────────────────── */
:root {
  --bg:           #05091a;
  --bg2:          #080e22;
  --surface:      rgba(255,255,255,0.03);
  --border:       rgba(0,200,255,0.12);
  --border-hot:   rgba(0,200,255,0.35);

  --empty:        #0b1530;
  --empty-border: rgba(0,180,255,0.07);

  --cell-blue:    #1a6fff;
  --cell-blue-hi: #3d8fff;
  --cell-glow:    rgba(26,111,255,0.55);

  --cell-green:   #00e676;
  --cell-green-hi:#4dffa0;
  --cell-glow-g:  rgba(0,230,118,0.5);

  --text:         #b8d4ff;
  --text-dim:     rgba(140,180,255,0.35);
  --text-mid:     rgba(160,200,255,0.6);

  --accent:       #00cfff;
  --accent2:      #00e676;
  --danger:       #ff3d6b;

  --btn-primary:  linear-gradient(135deg, #0090e0 0%, #0050d0 100%);
  --btn-reset-bg: rgba(255,255,255,0.05);
}

/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── Body & background ──────────────────────────────────────────────────── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: calc(80px + env(safe-area-inset-bottom));
}

/* Scanline background */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,200,255,0.012) 2px,
      rgba(0,200,255,0.012) 4px
    );
  pointer-events: none;
}

/* Top ambient glow */
body::after {
  content: '';
  position: fixed;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 260px;
  background: radial-gradient(ellipse, rgba(0,160,255,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  position: relative; z-index: 10;
  padding: 13px 16px 11px;
  background: rgba(5,9,26,0.9);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-left h1 {
  font-family: 'Orbitron', monospace;
  font-size: 12px;
  font-weight: 900;
  letter-spacing: 0.18em;
  color: var(--accent);
  text-shadow: 0 0 18px rgba(0,207,255,0.6);
  text-transform: uppercase;
}

.header-left p {
  font-size: 10.5px;
  color: var(--text-dim);
  margin-top: 2px;
  letter-spacing: 0.04em;
  font-weight: 300;
}

.mode-pill {
  font-family: 'Orbitron', monospace;
  font-size: 7.5px;
  font-weight: 600;
  letter-spacing: 0.12em;
  padding: 4px 9px;
  border-radius: 20px;
  text-transform: uppercase;
}

.mode-pill.review {
  background: rgba(0,207,255,0.1);
  color: var(--accent);
  border: 1px solid rgba(0,207,255,0.25);
}

.mode-pill.simulate {
  background: rgba(0,230,118,0.1);
  color: var(--accent2);
  border: 1px solid rgba(0,230,118,0.25);
}

/* ── Error ──────────────────────────────────────────────────────────────── */
#error-msg {
  display: none;
  position: relative; z-index: 5;
  margin: 10px 14px 0;
  padding: 10px 14px;
  background: rgba(255,61,107,0.08);
  border: 1px solid rgba(255,61,107,0.3);
  border-radius: 10px;
  font-size: 12px;
  color: var(--danger);
  letter-spacing: 0.03em;
}

/* ── Section ────────────────────────────────────────────────────────────── */
.section {
  position: relative; z-index: 5;
  padding: 14px 14px 0;
}

.section-label {
  font-family: 'Orbitron', monospace;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  text-transform: uppercase;
  margin-bottom: 9px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, rgba(0,200,255,0.2), transparent);
}

/* ── Main 8×8 Grid ──────────────────────────────────────────────────────── */
.grid-wrap {
  display: flex;
  justify-content: center;
}

#main-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px;
  width: min(100%, 348px);
  aspect-ratio: 1;
  padding: 5px;
  background: rgba(0,160,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 0 0 1px rgba(0,160,255,0.05), 0 8px 40px rgba(0,0,0,0.5);
}

.gc {
  background: var(--empty);
  border-radius: 4px;
  cursor: pointer;
  border: 1px solid var(--empty-border);
  aspect-ratio: 1;
  transition: background 0.1s ease, box-shadow 0.1s ease, transform 0.07s ease;
  position: relative;
  overflow: hidden;
}

.gc::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.06), transparent);
  border-radius: 3px 3px 0 0;
  pointer-events: none;
}

.gc.on {
  background: linear-gradient(145deg, var(--cell-blue-hi), var(--cell-blue));
  border-color: rgba(70,140,255,0.5);
  box-shadow:
    0 0 8px var(--cell-glow),
    0 0 2px rgba(255,255,255,0.1) inset;
}

.gc:active { transform: scale(0.82); }

/* ── Pieces ─────────────────────────────────────────────────────────────── */
.pieces-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.piece-slot {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 10px 8px 9px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s;
}

.piece-slot::before {
  content: '';
  position: absolute;
  top: 0; left: 15%; right: 15%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(0,230,118,0.5), transparent);
}

.piece-slot-label {
  font-family: 'Orbitron', monospace;
  font-size: 7px;
  font-weight: 600;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.piece-grid-wrap {
  aspect-ratio: 1;
  width: 100%;
}

.piece-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  gap: 2px;
  width: 100%;
  height: 100%;
}

.pc {
  background: rgba(0,25,60,0.8);
  border-radius: 2px;
  cursor: pointer;
  border: 1px solid rgba(0,200,120,0.05);
  transition: background 0.09s ease, box-shadow 0.09s ease, transform 0.07s ease;
  position: relative;
  overflow: hidden;
}

.pc::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 40%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.07), transparent);
  pointer-events: none;
}

.pc.on {
  background: linear-gradient(145deg, var(--cell-green-hi), var(--cell-green));
  border-color: rgba(0,230,118,0.4);
  box-shadow:
    0 0 6px var(--cell-glow-g),
    0 0 1px rgba(255,255,255,0.15) inset;
}

.pc:active { transform: scale(0.8); }

/* ── Hint ───────────────────────────────────────────────────────────────── */
.hint {
  position: relative; z-index: 5;
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  padding: 10px 16px 0;
  letter-spacing: 0.08em;
  font-weight: 300;
}

/* ── Footer ─────────────────────────────────────────────────────────────── */
.footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, rgba(5,9,26,1) 60%, rgba(5,9,26,0));
  display: flex;
  gap: 8px;
}

.btn {
  height: 50px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: 0.06em;
  transition: opacity 0.12s, transform 0.1s, box-shadow 0.15s;
}

.btn:active { opacity: 0.8; transform: scale(0.97); }

#btn-solve {
  flex: 1;
  background: var(--btn-primary);
  color: #fff;
  box-shadow: 0 4px 24px rgba(0,120,220,0.35);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

#btn-solve:hover {
  box-shadow: 0 4px 32px rgba(0,140,255,0.5);
}

#btn-reset {
  flex: 0 0 56px;
  background: var(--btn-reset-bg);
  color: var(--text-mid);
  border: 1px solid var(--border);
  font-size: 19px;
  letter-spacing: 0;
}

/* ── Pulse animation for active cells ───────────────────────────────────── */
@keyframes cellPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.78); }
  70%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}

.gc.pop, .pc.pop { animation: cellPop 0.18s ease forwards; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="header-title">Block Blast</h1>
    <p id="header-sub">Tocca le celle per modificarle</p>
  </div>
  <div id="mode-pill" class="mode-pill review">REVIEW</div>
</header>

<div id="error-msg"></div>

<div class="section" style="margin-top:2px">
  <div class="section-label">Board</div>
  <div class="grid-wrap">
    <div id="main-grid"></div>
  </div>
</div>

<div class="section" style="margin-top:14px">
  <div class="section-label">Pieces</div>
  <div class="pieces-row" id="pieces-row"></div>
</div>

<p class="hint">Tocca qualsiasi cella per attivarla / disattivarla</p>

<div class="footer">
  <button class="btn" id="btn-reset">↺</button>
  <button class="btn" id="btn-solve">✓ Conferma e risolvi</button>
</div>

<script>
/* ── Constants ─────────────────────────────────────────────────────────── */
const GRID_SIZE = 8;
const PIECE_MAX = 5;

/* ── Decode URL hash ────────────────────────────────────────────────────── */
function decode(b64) {
  // Handle URL-safe base64 + Telegram may append ?params or &params to the hash
  let clean = b64.replace(/[?&].*$/, '');          // strip Telegram injected params
  let str   = clean.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4 !== 0) str += '=';
  return JSON.parse(atob(str));
}

let original    = null;
let isSimulate  = false;
let gridState   = Array.from({length: 8}, () => Array(8).fill(0));
let pieceStates = [];

try {
  const raw = location.hash.slice(1);
  if (!raw) throw new Error('Nessun dato nell\'URL');
  original   = decode(raw);
  isSimulate = !!original.simulate;
} catch(e) {
  showError('Impossibile caricare i dati: ' + e.message);
}

/* ── Adapt UI for mode ──────────────────────────────────────────────────── */
if (isSimulate || !original) {
  document.getElementById('header-title').textContent = 'Simulatore';
  document.getElementById('header-sub').textContent   = 'Disegna griglia e pezzi, poi risolvi';
  const pill = document.getElementById('mode-pill');
  pill.textContent  = 'SIMULATE';
  pill.className    = 'mode-pill simulate';
}

/* ── Grid helpers ────────────────────────────────────────────────────────── */
function rowToBits(rowInt, width) {
  return Array.from({length: width}, (_, c) => (rowInt >> (width - 1 - c)) & 1);
}

function blockWidth(fig) {
  const m = Math.max(...fig);
  if (m === 0) return 0;
  return Math.floor(Math.log2(m)) + 1;
}

function gridFromInts(ints) {
  return ints.map(v => rowToBits(v, GRID_SIZE));
}

function gridToInts(g) {
  return g.map(row => row.reduce((acc, b, i) => acc | (b << (GRID_SIZE - 1 - i)), 0));
}

function figTo5x5(fig) {
  const cells = Array.from({length: PIECE_MAX}, () => Array(PIECE_MAX).fill(false));
  if (!fig || fig.length === 0) return cells;
  const bw = blockWidth(fig);
  if (bw === 0) return cells;
  for (let r = 0; r < Math.min(fig.length, PIECE_MAX); r++) {
    for (let c = 0; c < Math.min(bw, PIECE_MAX); c++) {
      cells[r][c] = !!((fig[r] >> (bw - 1 - c)) & 1);
    }
  }
  return cells;
}

function figFrom5x5(cells) {
  let maxR = -1, maxC = -1;
  for (let r = 0; r < PIECE_MAX; r++)
    for (let c = 0; c < PIECE_MAX; c++)
      if (cells[r][c]) { maxR = Math.max(maxR, r); maxC = Math.max(maxC, c); }
  if (maxR < 0) return [0];
  const out = [];
  for (let r = 0; r <= maxR; r++) {
    let val = 0;
    for (let c = 0; c <= maxC; c++) val = (val << 1) | (cells[r][c] ? 1 : 0);
    out.push(val);
  }
  return out;
}

/* ── Build main grid ─────────────────────────────────────────────────────── */
function buildGrid() {
  const el = document.getElementById('main-grid');
  el.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'gc' + (gridState[r][c] ? ' on' : '');
      cell.addEventListener('pointerdown', () => toggleGrid(cell, r, c));
      el.appendChild(cell);
    }
  }
}

function toggleGrid(cell, r, c) {
  gridState[r][c] ^= 1;
  cell.classList.toggle('on', !!gridState[r][c]);
  cell.classList.remove('pop');
  void cell.offsetWidth;
  cell.classList.add('pop');
}

/* ── Build piece editors ─────────────────────────────────────────────────── */
function buildPieces() {
  const row = document.getElementById('pieces-row');
  row.innerHTML = '';

  pieceStates.forEach((cells, fi) => {
    const slot = document.createElement('div');
    slot.className = 'piece-slot';

    const lbl = document.createElement('div');
    lbl.className   = 'piece-slot-label';
    lbl.textContent = `PIECE ${fi + 1}`;
    slot.appendChild(lbl);

    const wrap  = document.createElement('div');
    wrap.className = 'piece-grid-wrap';

    const pgrid = document.createElement('div');
    pgrid.className = 'piece-grid';

    for (let r = 0; r < PIECE_MAX; r++) {
      for (let c = 0; c < PIECE_MAX; c++) {
        const cell  = document.createElement('div');
        const _r = r, _c = c;
        cell.className = 'pc' + (cells[r][c] ? ' on' : '');
        cell.addEventListener('pointerdown', () => togglePiece(cell, fi, _r, _c));
        pgrid.appendChild(cell);
      }
    }

    wrap.appendChild(pgrid);
    slot.appendChild(wrap);
    row.appendChild(slot);
  });
}

function togglePiece(cell, fi, r, c) {
  pieceStates[fi][r][c] = !pieceStates[fi][r][c];
  cell.classList.toggle('on', pieceStates[fi][r][c]);
  cell.classList.remove('pop');
  void cell.offsetWidth;
  cell.classList.add('pop');
}

/* ── Reset ───────────────────────────────────────────────────────────────── */
function resetAll() {
  if (original && !isSimulate) {
    gridState   = gridFromInts(original.grid);
    const figs  = (original.figures || []).slice();
    while (figs.length < 3) figs.push([]);
    pieceStates = figs.map(figTo5x5);
  } else {
    gridState   = Array.from({length: 8}, () => Array(8).fill(0));
    pieceStates = Array.from({length: 3}, () =>
      Array.from({length: PIECE_MAX}, () => Array(PIECE_MAX).fill(false))
    );
  }
  buildGrid();
  buildPieces();
}

/* ── Confirm & send ──────────────────────────────────────────────────────── */
document.getElementById('btn-solve').addEventListener('click', () => {
  const grid    = gridToInts(gridState);
  const figures = pieceStates
    .map(figFrom5x5)
    .filter(f => f.some(v => v !== 0));

  const payload = JSON.stringify({ grid, figures });

  if (window.Telegram?.WebApp?.sendData) {
    Telegram.WebApp.sendData(payload);
  } else {
    // Dev fallback
    alert('Payload:\n' + payload);
  }
});

document.getElementById('btn-reset').addEventListener('click', resetAll);

/* ── Error helper ────────────────────────────────────────────────────────── */
function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent  = '⚠ ' + msg;
  el.style.display = 'block';
}

/* ── Init ────────────────────────────────────────────────────────────────── */
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

resetAll();
</script>
</body>
</html>
