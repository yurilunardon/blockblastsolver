<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Block Blast Solution</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --page: #070b18;
  --page-top: #172448;
  --panel: rgba(13, 20, 43, 0.92);
  --line: rgba(255, 255, 255, 0.12);
  --text: #f5f7ff;
  --muted: #9da9d2;
  --soft: #66739f;
  --empty: #121f42;
  --empty-hi: #1a2b5a;
  --yellow: #ffd447;
  --orange: #ff914d;
  --pink: #ff5f8f;
  --blue: #2f80ed;
  --cyan: #2ed3ff;
  --green: #22d36c;
  --purple: #9d6cff;
  --shadow: 0 18px 44px rgba(0, 0, 0, 0.34);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body {
  min-height: 100vh;
  background:
    linear-gradient(180deg, var(--page-top) 0%, #111832 36%, var(--page) 100%);
  color: var(--text);
  font-family: "Inter", system-ui, sans-serif;
  overflow-x: hidden;
  padding-bottom: calc(82px + env(safe-area-inset-bottom));
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.055) 0 1px, transparent 1px 24px),
    linear-gradient(45deg, rgba(255, 212, 71, 0.04) 0 1px, transparent 1px 30px);
  opacity: 0.55;
}

button {
  font: inherit;
}

.app {
  position: relative;
  z-index: 1;
  width: min(100%, 460px);
  margin: 0 auto;
  padding: 12px 12px 0;
}

.topbar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 10px 2px 8px;
}

.brand {
  display: flex;
  align-items: center;
  min-width: 0;
  gap: 10px;
}

.brand-mark {
  width: 38px;
  height: 38px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 4px;
  padding: 4px;
  background: #0b1229;
  border: 1px solid var(--line);
  border-radius: 8px;
}

.brand-mark span {
  border-radius: 4px;
  box-shadow: inset 0 4px 0 rgba(255, 255, 255, 0.24);
}

.brand-mark span:nth-child(1) { background: var(--yellow); }
.brand-mark span:nth-child(2) { background: var(--pink); }
.brand-mark span:nth-child(3) { background: var(--cyan); }
.brand-mark span:nth-child(4) { background: var(--green); }

.brand-copy {
  min-width: 0;
}

.brand-copy h1 {
  font-family: "Fredoka", system-ui, sans-serif;
  font-size: 22px;
  line-height: 1;
  color: var(--text);
  white-space: nowrap;
}

#step-label {
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#score-badge {
  min-width: 72px;
  text-align: center;
  border: 1px solid rgba(255, 212, 71, 0.5);
  color: #1b1230;
  background: linear-gradient(180deg, #fff07d, var(--yellow));
  border-radius: 999px;
  padding: 8px 10px;
  font-family: "Fredoka", system-ui, sans-serif;
  font-size: 14px;
  font-weight: 700;
  box-shadow: 0 10px 22px rgba(255, 179, 41, 0.2);
}

#dots {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 6px;
  min-height: 16px;
  padding: 0 2px 3px 48px;
}

.dot {
  width: 21px;
  height: 6px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.13);
  transition: width 0.18s ease, background 0.18s ease;
}

.dot.done {
  background: var(--blue);
}

.dot.current {
  width: 34px;
  background: var(--green);
}

#clear-bar {
  display: none;
  position: relative;
  z-index: 1;
  width: min(calc(100% - 24px), 436px);
  margin: 0 auto 10px;
  padding: 9px 12px;
  border: 1px solid rgba(255, 145, 77, 0.4);
  border-radius: 8px;
  background: rgba(255, 145, 77, 0.14);
  color: #ffd4b8;
  font-size: 12px;
  font-weight: 800;
  text-align: center;
}

#clear-bar.visible {
  display: block;
}

#error {
  display: none;
  margin: 24px 0;
  padding: 12px;
  border: 1px solid rgba(255, 95, 143, 0.4);
  background: rgba(255, 95, 143, 0.12);
  color: #ffc4d5;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  text-align: center;
}

.board-panel,
.pieces-panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
}

.board-panel {
  padding: 10px;
}

#grid-outer {
  width: min(100%, 384px);
  margin: 0 auto;
}

#col-labels {
  display: grid;
  padding-left: 22px;
  margin-bottom: 4px;
}

.clbl,
.rlbl {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--soft);
  font-size: 10px;
  font-weight: 800;
}

.clbl.hl,
.rlbl.hl {
  color: var(--yellow);
}

#grid-row-wrap {
  position: relative;
  display: flex;
}

#row-labels {
  display: flex;
  flex: 0 0 22px;
  flex-direction: column;
}

#main-grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 4px;
  padding: 8px;
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01)),
    #0b1431;
  border: 1px solid rgba(255, 255, 255, 0.16);
}

.gc {
  position: relative;
  aspect-ratio: 1;
  border-radius: 6px;
  background: linear-gradient(180deg, var(--empty-hi), var(--empty));
  box-shadow:
    inset 0 3px 0 rgba(255, 255, 255, 0.05),
    inset 0 -3px 0 rgba(0, 0, 0, 0.18);
  transition: transform 0.18s ease, filter 0.18s ease, background 0.18s ease;
}

.gc.filled {
  background: linear-gradient(180deg, var(--tile-hi), var(--tile));
  box-shadow:
    inset 0 5px 0 rgba(255, 255, 255, 0.25),
    inset 0 -5px 0 rgba(0, 0, 0, 0.16);
}

.gc.new {
  background: linear-gradient(180deg, #7bffab, var(--green));
  transform: scale(0.9);
  box-shadow: 0 0 14px rgba(34, 211, 108, 0.38), inset 0 5px 0 rgba(255, 255, 255, 0.25);
}

.gc.new-clear {
  background: linear-gradient(180deg, #fff38b, var(--yellow));
  transform: scale(0.9);
  box-shadow: 0 0 14px rgba(255, 212, 71, 0.4), inset 0 5px 0 rgba(255, 255, 255, 0.35);
}

.gc.clearing {
  background: linear-gradient(180deg, #ffc184, var(--orange));
  animation: flashClear 0.55s ease 3;
  box-shadow: 0 0 14px rgba(255, 145, 77, 0.42), inset 0 5px 0 rgba(255, 255, 255, 0.25);
}

.gc.clearing::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 6px;
  background: repeating-linear-gradient(45deg, transparent 0 5px, rgba(255, 255, 255, 0.22) 5px 7px);
}

@keyframes flashClear {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.45); }
}

.row-cleared-hl,
.col-cleared-hl {
  position: absolute;
  pointer-events: none;
  z-index: 3;
  border: 2px solid var(--yellow);
  border-radius: 8px;
  box-shadow: 0 0 16px rgba(255, 212, 71, 0.45);
}

.pieces-panel {
  margin-top: 12px;
  padding: 10px;
}

#piece-strip {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.piece-card {
  min-height: 102px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  gap: 7px;
  padding: 9px 7px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 8px;
  background: #0d1735;
  transition: opacity 0.18s ease, border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
}

.piece-card.active {
  border-color: rgba(255, 212, 71, 0.7);
  background: #17244f;
  transform: translateY(-2px);
}

.piece-card.used {
  opacity: 0.35;
}

.piece-lbl {
  width: 100%;
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
  text-align: center;
  text-transform: uppercase;
}

.piece-card.active .piece-lbl {
  color: var(--yellow);
}

.piece-shape {
  --piece-cell: 15px;
  display: grid;
  justify-content: center;
  align-content: center;
  gap: 3px;
  min-width: 58px;
  min-height: 58px;
}

.piece-cube {
  width: var(--piece-cell);
  height: var(--piece-cell);
  grid-column: var(--c);
  grid-row: var(--r);
  border-radius: 4px;
  background: linear-gradient(180deg, var(--cube-hi), var(--cube));
  box-shadow:
    inset 0 4px 0 rgba(255, 255, 255, 0.28),
    inset 0 -4px 0 rgba(0, 0, 0, 0.15),
    0 4px 8px rgba(0, 0, 0, 0.18);
}

.piece-card.active .piece-cube {
  --cube: var(--green);
  --cube-hi: #7bffab;
}

.state-label {
  min-height: 24px;
  padding: 8px 2px 0;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-align: center;
}

.controls {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 20;
  padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, rgba(7, 11, 24, 0), rgba(7, 11, 24, 0.96) 28%, #070b18 100%);
}

.controls-inner {
  width: min(100%, 460px);
  margin: 0 auto;
  display: grid;
  grid-template-columns: 112px 1fr;
  gap: 8px;
}

.controls button {
  height: 52px;
  border: 0;
  border-radius: 8px;
  font-family: "Fredoka", system-ui, sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.1s ease, opacity 0.12s ease;
}

.controls button:active {
  transform: scale(0.97);
}

.controls button:disabled {
  opacity: 0.42;
  cursor: not-allowed;
  transform: none;
}

#btn-prev {
  background: #141e3f;
  color: #dce4ff;
  border: 1px solid rgba(255, 255, 255, 0.12);
}

#btn-next {
  color: #1a1230;
  background: linear-gradient(180deg, #fff38b 0%, #ffd447 44%, #ff9e3d 100%);
  box-shadow: 0 12px 24px rgba(255, 161, 55, 0.24);
}

@media (max-width: 360px) {
  .app {
    padding-left: 9px;
    padding-right: 9px;
  }

  .brand-copy h1 {
    font-size: 20px;
  }

  .piece-shape {
    --piece-cell: 14px;
  }

  .controls-inner {
    grid-template-columns: 96px 1fr;
  }
}
</style>
</head>
<body>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      <div class="brand-copy">
        <h1>Soluzione</h1>
        <div id="step-label">Loading</div>
      </div>
    </div>
    <div id="score-badge">+0</div>
    <div id="dots"></div>
  </header>

  <div id="clear-bar"></div>
  <div id="error"></div>

  <main>
    <section class="board-panel">
      <div id="grid-outer">
        <div id="col-labels"></div>
        <div id="grid-row-wrap">
          <div id="row-labels"></div>
          <div id="main-grid"></div>
        </div>
      </div>
    </section>

    <section class="pieces-panel">
      <div id="piece-strip"></div>
    </section>

    <div class="state-label" id="state-label"></div>
  </main>
</div>

<div class="controls">
  <div class="controls-inner">
    <button id="btn-prev" type="button">Indietro</button>
    <button id="btn-next" type="button">Avanti</button>
  </div>
</div>

<script>
const GRID_SIZE = 8;
const BOARD_COLORS = [
  ["#2f80ed", "#67b7ff"],
  ["#22d36c", "#7bffab"],
  ["#ffd447", "#fff38b"],
  ["#ff5f8f", "#ffa0bd"],
  ["#9d6cff", "#c8a8ff"],
  ["#2ed3ff", "#8cf0ff"],
  ["#ff914d", "#ffc184"]
];
const PIECE_COLORS = ["#2f80ed", "#22d36c", "#ffd447", "#ff5f8f", "#9d6cff", "#2ed3ff", "#ff914d"];

function b64decode(s) {
  let clean = s.replace(/[?&].*$/, "");
  let str = clean.replace(/-/g, "+").replace(/_/g, "/");
  while (str.length % 4 !== 0) str += "=";
  return JSON.parse(atob(str));
}

let data = null;
try {
  const hash = location.hash.slice(1);
  if (!hash) throw new Error("No data in URL");
  data = b64decode(hash);
} catch (e) {
  const el = document.getElementById("error");
  el.style.display = "block";
  el.textContent = "Errore caricamento soluzione: " + e.message;
}

function cellFilled(grid, r, c) {
  return !!((grid[r] >> (7 - c)) & 1);
}

function blockWidth(fig) {
  const m = Math.max(...(fig || [0]));
  return m === 0 ? 0 : Math.floor(Math.log2(m)) + 1;
}

function placeBlock(grid, fig, row, col) {
  const bw = blockWidth(fig);
  const g = [...grid];
  const shift = GRID_SIZE - bw - col;
  for (let i = 0; i < fig.length; i++) g[row + i] |= (fig[i] << shift);
  return g;
}

function clearLines(grid, rows, cols) {
  const g = [...grid];
  for (const r of rows) g[r] = 0;
  for (const c of cols) {
    const mask = (~(1 << (7 - c))) & 0xFF;
    for (let r = 0; r < GRID_SIZE; r++) g[r] &= mask;
  }
  return g;
}

function getNewCells(fig, row, col) {
  const bw = blockWidth(fig);
  const cells = new Set();
  for (let ri = 0; ri < fig.length; ri++) {
    for (let ci = 0; ci < bw; ci++) {
      if (fig[ri] & (1 << (bw - 1 - ci))) cells.add(`${row + ri},${col + ci}`);
    }
  }
  return cells;
}

function colorPair(color) {
  const hi = {
    "#2f80ed": "#67b7ff",
    "#22d36c": "#7bffab",
    "#ffd447": "#fff38b",
    "#ff5f8f": "#ffa0bd",
    "#9d6cff": "#c8a8ff",
    "#2ed3ff": "#8cf0ff",
    "#ff914d": "#ffc184"
  };
  return [color, hi[color] || "#ffffff"];
}

function renderShape(target, fig, color) {
  target.innerHTML = "";
  const bw = blockWidth(fig);
  if (!bw || !fig?.length) return;
  const [cube, cubeHi] = colorPair(color);
  target.style.gridTemplateColumns = `repeat(${bw}, var(--piece-cell))`;
  target.style.gridTemplateRows = `repeat(${fig.length}, var(--piece-cell))`;

  for (let r = 0; r < fig.length; r++) {
    for (let c = 0; c < bw; c++) {
      if (!(fig[r] & (1 << (bw - 1 - c)))) continue;
      const cell = document.createElement("span");
      cell.className = "piece-cube";
      cell.style.setProperty("--r", String(r + 1));
      cell.style.setProperty("--c", String(c + 1));
      cell.style.setProperty("--cube", cube);
      cell.style.setProperty("--cube-hi", cubeHi);
      target.appendChild(cell);
    }
  }
}

let steps = [];
if (data) {
  const ops = data.solution.operations;
  let grid = [...data.grid];
  const usedBefore = Array(data.figures.length).fill(false);

  steps.push({ grid: [...grid], newCells: new Set(), clearedRows: [], clearedCols: [], op: null, isInitial: true, usedBefore: [...usedBefore] });

  for (let i = 0; i < ops.length; i++) {
    const op = ops[i];
    const bid = op.placed_block_id;
    const fig = data.figures[bid];
    const row = op.placed_row;
    const col = op.placed_col;
    const newCells = getNewCells(fig, row, col);
    const clearedRows = op.cleared_rows || [];
    const clearedCols = op.cleared_cols || [];
    const gridWithBlock = placeBlock(grid, fig, row, col);
    const gridAfter = clearLines(gridWithBlock, clearedRows, clearedCols);
    steps.push({
      grid: [...grid],
      gridWithBlock,
      gridAfter,
      newCells,
      clearedRows,
      clearedCols,
      op,
      usedBefore: [...usedBefore],
      activeBid: bid
    });
    usedBefore[bid] = true;
    grid = gridAfter;
  }

  steps.push({ grid: [...grid], newCells: new Set(), clearedRows: [], clearedCols: [], op: null, isFinalBoard: true, usedBefore: Array(data.figures.length).fill(true) });
}

let currentStep = 0;
const totalSteps = steps.length;

function buildDots() {
  const el = document.getElementById("dots");
  el.innerHTML = "";
  steps.filter(s => s.op).forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "dot";
    dot.id = `dot-${i}`;
    el.appendChild(dot);
  });
}

function buildColLabels() {
  const el = document.getElementById("col-labels");
  el.innerHTML = "";
  el.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 1fr)`;
  for (let c = 0; c < GRID_SIZE; c++) {
    const lbl = document.createElement("div");
    lbl.className = "clbl";
    lbl.id = `clbl-${c}`;
    lbl.textContent = String.fromCharCode(65 + c);
    el.appendChild(lbl);
  }
}

function buildRowLabels() {
  const el = document.getElementById("row-labels");
  el.innerHTML = "";
  for (let r = 0; r < GRID_SIZE; r++) {
    const lbl = document.createElement("div");
    lbl.className = "rlbl";
    lbl.id = `rlbl-${r}`;
    lbl.style.height = `calc(100% / ${GRID_SIZE})`;
    lbl.textContent = String(r + 1);
    el.appendChild(lbl);
  }
}

function buildMainGrid() {
  const el = document.getElementById("main-grid");
  el.innerHTML = "";
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement("div");
      const pair = BOARD_COLORS[(r * 3 + c) % BOARD_COLORS.length];
      cell.className = "gc";
      cell.id = `gc-${r}-${c}`;
      cell.style.setProperty("--tile", pair[0]);
      cell.style.setProperty("--tile-hi", pair[1]);
      el.appendChild(cell);
    }
  }
}

function buildPieceStrip() {
  const el = document.getElementById("piece-strip");
  el.innerHTML = "";
  if (!data) return;
  data.figures.forEach((fig, fi) => {
    const card = document.createElement("div");
    card.className = "piece-card";
    card.id = `piece-${fi}`;

    const lbl = document.createElement("div");
    lbl.className = "piece-lbl";
    lbl.textContent = `Pezzo ${fi + 1}`;
    card.appendChild(lbl);

    const shape = document.createElement("div");
    shape.className = "piece-shape";
    renderShape(shape, fig, PIECE_COLORS[fi % PIECE_COLORS.length]);
    card.appendChild(shape);

    el.appendChild(card);
  });
}

let clearOverlays = [];
function removeClearOverlays() {
  clearOverlays.forEach(el => el.remove());
  clearOverlays = [];
}

function addClearOverlays(clearedRows, clearedCols) {
  const grid = document.getElementById("main-grid");
  const wrap = document.getElementById("grid-row-wrap");
  const gRect = grid.getBoundingClientRect();
  const wRect = wrap.getBoundingClientRect();
  const cellW = gRect.width / GRID_SIZE;
  const cellH = gRect.height / GRID_SIZE;
  const left = gRect.left - wRect.left;
  const top = gRect.top - wRect.top;

  clearedRows.forEach(r => {
    const ov = document.createElement("div");
    ov.className = "row-cleared-hl";
    ov.style.left = `${left}px`;
    ov.style.top = `${top + r * cellH}px`;
    ov.style.width = `${gRect.width}px`;
    ov.style.height = `${cellH}px`;
    wrap.appendChild(ov);
    clearOverlays.push(ov);
  });

  clearedCols.forEach(c => {
    const ov = document.createElement("div");
    ov.className = "col-cleared-hl";
    ov.style.left = `${left + c * cellW}px`;
    ov.style.top = `${top}px`;
    ov.style.width = `${cellW}px`;
    ov.style.height = `${gRect.height}px`;
    wrap.appendChild(ov);
    clearOverlays.push(ov);
  });
}

function renderStep(idx) {
  const s = steps[idx];
  if (!s) return;

  const crSet = new Set(s.clearedRows);
  const ccSet = new Set(s.clearedCols);
  const hasClears = crSet.size > 0 || ccSet.size > 0;
  const displayGrid = s.gridWithBlock || s.grid;
  removeClearOverlays();

  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.getElementById(`gc-${r}-${c}`);
      if (!cell) continue;
      const key = `${r},${c}`;
      const isNew = s.newCells.has(key);
      const isClear = crSet.has(r) || ccSet.has(c);
      const isFill = cellFilled(displayGrid, r, c);
      cell.className = "gc";
      if (isNew && isClear) cell.classList.add("new-clear");
      else if (isNew) cell.classList.add("new");
      else if (isFill && isClear) cell.classList.add("clearing");
      else if (isFill) cell.classList.add("filled");
    }
  }

  for (let r = 0; r < GRID_SIZE; r++) {
    const el = document.getElementById(`rlbl-${r}`);
    if (el) el.classList.toggle("hl", crSet.has(r));
  }
  for (let c = 0; c < GRID_SIZE; c++) {
    const el = document.getElementById(`clbl-${c}`);
    if (el) el.classList.toggle("hl", ccSet.has(c));
  }

  if (hasClears) requestAnimationFrame(() => addClearOverlays([...crSet], [...ccSet]));

  const cbar = document.getElementById("clear-bar");
  if (hasClears) {
    const parts = [];
    if (crSet.size) parts.push([...crSet].sort((a, b) => a - b).map(r => `Riga ${r + 1}`).join(", "));
    if (ccSet.size) parts.push([...ccSet].sort((a, b) => a - b).map(c => `Col ${String.fromCharCode(65 + c)}`).join(", "));
    cbar.textContent = `Linee completate: ${parts.join(" + ")}${s.op?.score ? ` | +${s.op.score} pt` : ""}`;
    cbar.classList.add("visible");
  } else {
    cbar.classList.remove("visible");
  }

  let stepText = "";
  if (s.isInitial) stepText = "Board iniziale";
  else if (s.isFinalBoard) stepText = "Griglia finale";
  else {
    const opIdx = steps.slice(0, idx).filter(x => x.op).length;
    const total = steps.filter(x => x.op).length;
    const col = String.fromCharCode(65 + s.op.placed_col);
    stepText = `Mossa ${opIdx + 1}/${total}: pezzo ${s.op.placed_block_id + 1} in ${s.op.placed_row + 1}${col}`;
  }
  document.getElementById("step-label").textContent = stepText;

  let dotIdx = 0;
  steps.forEach((st, i) => {
    if (!st.op) return;
    const dot = document.getElementById(`dot-${dotIdx}`);
    if (dot) dot.className = "dot" + (i < idx ? " done" : i === idx ? " current" : "");
    dotIdx++;
  });

  if (data) data.figures.forEach((_, fi) => {
    const card = document.getElementById(`piece-${fi}`);
    if (!card) return;
    card.classList.remove("active", "used");
    if (s.usedBefore?.[fi]) card.classList.add("used");
    else if (s.activeBid === fi) card.classList.add("active");
  });

  document.getElementById("btn-prev").disabled = idx === 0;
  document.getElementById("btn-next").disabled = idx === totalSteps - 1;
  document.getElementById("btn-next").textContent = idx === totalSteps - 2 ? "Finale" : "Avanti";

  const state = document.getElementById("state-label");
  if (s.isInitial) state.textContent = "Pronto per la prima mossa";
  else if (s.isFinalBoard) state.textContent = "Sequenza completata";
  else if (hasClears) state.textContent = `${crSet.size + ccSet.size} linea/e completata/e`;
  else state.textContent = "";
}

document.getElementById("btn-next").addEventListener("click", () => {
  if (currentStep < totalSteps - 1) {
    currentStep++;
    renderStep(currentStep);
  }
});

document.getElementById("btn-prev").addEventListener("click", () => {
  if (currentStep > 0) {
    currentStep--;
    renderStep(currentStep);
  }
});

let touchStartX = 0;
document.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 55) {
    if (dx < 0 && currentStep < totalSteps - 1) {
      currentStep++;
      renderStep(currentStep);
    }
    if (dx > 0 && currentStep > 0) {
      currentStep--;
      renderStep(currentStep);
    }
  }
}, { passive: true });

if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

if (data) {
  if (data.solution?.score) document.getElementById("score-badge").textContent = `+${data.solution.score}`;
  buildDots();
  buildColLabels();
  buildRowLabels();
  buildMainGrid();
  buildPieceStrip();
  renderStep(0);
}
</script>
</body>
</html>
